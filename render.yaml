services:
  - type: web
    name: scribe-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run db:migrate && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scribe-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://scribe-eight-mauve.vercel.app"

databases:
  - name: scribe-db
    plan: free
